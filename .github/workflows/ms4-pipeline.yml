name: MS4 Search Discovery CI/CD

on:
  push:
    branches: [ "q/a", "main" ]
    paths:
      - 'uce-trade-backend/ms4-search-discovery/**'
      - '.github/workflows/ms4-pipeline.yml'
  pull_request:
    branches: [ "q/a", "main" ]
    paths:
      - 'uce-trade-backend/ms4-search-discovery/**'
      - '.github/workflows/ms4-pipeline.yml'

jobs:
  # Job 1: Unit tests are always run (for PRs and pushes)
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./uce-trade-backend/ms4-search-discovery
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Go 1.22
      uses: actions/setup-go@v4
      with:
        go-version: '1.22'

    - name: Run Unit Tests (MS4)
      run: go test -v ./...

  # Job 2: Only if it's a PUSH (Merge) to the branches, never in an open PR
  build-and-push:
    needs: test
    if: github.event_name == 'push' 
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./uce-trade-backend/ms4-search-discovery
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Go 1.22
      uses: actions/setup-go@v4
      with:
        go-version: '1.22'

    - name: Build Go App (MS4)
      run: go build -v ./...

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Determine Docker Tag
      run: |
        if [ "${{ github.ref_name }}" == "main" ]; then
          echo "IMAGE_TAG=prod" >> $GITHUB_ENV
        else
          echo "IMAGE_TAG=qa" >> $GITHUB_ENV
        fi

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./uce-trade-backend/ms4-search-discovery
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/ms4-search-discovery:${{ env.IMAGE_TAG }}