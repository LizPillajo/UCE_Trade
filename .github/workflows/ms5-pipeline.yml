# .github/workflows/ms5-pipeline.yml
name: MS5 Interactions Reviews CI/CD

on:
  push:
    branches: [ "q/a", "main" ]
    paths:
      - 'uce-trade-backend/ms5-interactions-reviews/**'
      - '.github/workflows/ms5-pipeline.yml'
  pull_request:
    branches: [ "q/a", "main" ]
    paths:
      - 'uce-trade-backend/ms5-interactions-reviews/**'
      - '.github/workflows/ms5-pipeline.yml'

jobs:
  build-test-and-push:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./uce-trade-backend/ms5-interactions-reviews
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './uce-trade-backend/ms5-interactions-reviews/package-lock.json'

    - name: Install Dependencies
      run: npm install

    - name: Run Unit Tests (MS5)
      run: npm test

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Determine Docker Tag
      run: |
        if [ "${{ github.ref_name }}" == "main" ]; then
          echo "IMAGE_TAG=prod" >> $GITHUB_ENV
        else
          echo "IMAGE_TAG=qa" >> $GITHUB_ENV
        fi

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./uce-trade-backend/ms5-interactions-reviews
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/ms5-interactions-reviews:${{ env.IMAGE_TAG }}