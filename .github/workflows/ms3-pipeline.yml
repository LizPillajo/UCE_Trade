name: MS3 Catalog Query CI/CD

on:
  push:
    branches: [ "main", "q/a" ]
    paths:
      - 'ms3-catalog-query/**' 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26'

    - name: Run Unit Tests
      working-directory: ./ms3-catalog-query
      run: go test -v ./...

    - name: Build Go App
      working-directory: ./ms3-catalog-query
      run: go build -v ./...

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Set Docker Tag
      id: vars
      run: |
        if [ "${{ github.ref }}" = "refs/heads/main" ]; then
          echo "TAG=prod" >> $GITHUB_ENV
        else
          echo "TAG=qa" >> $GITHUB_ENV
        fi

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: ./ms3-catalog-query
        push: true
        tags: lizdaisy/ms3-catalog-query:${{ env.TAG }}