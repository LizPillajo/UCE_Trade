name: MS9 Analytics Dashboards Pipeline

on:
  push:
    branches: [ "q/a", "main" ]
    paths:
      - 'uce-trade-backend/ms9-analytics-dashboards/**'
      - '.github/workflows/ms9-pipeline.yml'
  pull_request:
    branches: [ "q/a", "main" ]
    paths:
      - 'uce-trade-backend/ms9-analytics-dashboards/**'
      - '.github/workflows/ms9-pipeline.yml'

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./uce-trade-backend/ms9-analytics-dashboards

    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
        
    - name: Install Dependencies
      run: go mod tidy

    - name: Run Unit Tests
      run: go test ./... -v

    - name: Build
      run: go build -o ms9-app ./cmd/main.go

  docker-push:
    needs: test-and-build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Determine Docker Tag
      run: |
        if [ "${{ github.ref_name }}" == "main" ]; then
          echo "IMAGE_TAG=prod" >> $GITHUB_ENV
        else
          echo "IMAGE_TAG=qa" >> $GITHUB_ENV
        fi

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: ./uce-trade-backend/ms9-analytics-dashboards
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/ms9-analytics-dashboards:${{ env.IMAGE_TAG }}
