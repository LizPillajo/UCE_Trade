name: Create Release

on:
  push:
    branches: [ "main" ]
    # Optional: only if backend changes
    paths:
      - 'uce-trade-backend/**'
      - 'infrastructure/**'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to create releases
      pull-requests: write
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Get all tags/history

    - name: Get Current Version
      id: get_version
      run: |
        # Get the latest release tag
        LATEST_TAG=$(git tag -l "v*" --sort=-version:refname | head -n 1)
        
        if [ -z "$LATEST_TAG" ]; then
          # If no tags exist, start from v1.0.0
          NEW_VERSION="v1.0.0"
        else
          # Automatically increment patch version
          # Example: v1.0.0 -> v1.0.1
          BASE_VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="v${MAJOR}.${MINOR}.${NEW_PATCH}"
        fi
        
        echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "New version: $NEW_VERSION"

    - name: Generate Release Notes
      id: release_notes
      run: |
        # Generate release notes based on commits since last tag
        LAST_TAG=$(git tag -l "v*" --sort=-version:refname | head -n 1)
        
        if [ -z "$LAST_TAG" ]; then
          # First release: show all commits
          NOTES=$(git log --pretty=format:"- %s" --no-pager)
        else
          # Show commits since last tag
          NOTES=$(git log --pretty=format:"- %s" $LAST_TAG..HEAD --no-pager)
        fi
        
        # Escape for JSON
        NOTES_ESCAPED=$(echo "$NOTES" | sed ':a;N;$!ba;s/\n/\\n/g')
        echo "NOTES=$NOTES_ESCAPED" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.get_version.outputs.NEW_VERSION }}
        name: "Release ${{ steps.get_version.outputs.NEW_VERSION }}"
        body: |
          ## 🚀 Release ${{ steps.get_version.outputs.NEW_VERSION }}
          
          ### 📦 Included Microservices:
          - MS1 Identity & Access (Java/Spring Boot)
          - MS2 Product Command (Java/Spring Boot)  
          - MS3 Catalog Query (Go)
          - MS4 Search Discovery (Go)
          - MS0 API Gateway (Java/Spring Cloud Gateway)
          
          ### 🔧 Infrastructure:
          - Terraform (VPC, Subnets, ALB, Auto Scaling, RDS)
          - Docker images with tags: `qa` and `prod`
          
          ### ✨ Changes included:
          ${{ steps.release_notes.outputs.NOTES }}
          
          ### 📋 Deployment Notes:
          1. Docker images are already in Docker Hub with `prod` tag
          2. Apply Terraform to update infrastructure
          3. Verify ALB health checks pass
          
          ---
          *This release was automatically generated by GitHub Actions*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}