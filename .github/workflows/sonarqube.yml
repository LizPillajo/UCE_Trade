name: SonarQube Analysis

on:
  push:
    branches:
      - q/a
  pull_request:
    branches:
      - q/a

jobs:
  sonarqube:
    if: false
    name: SonarQube Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Historial completo para SonarQube

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            uce-trade-frontend/package-lock.json
            uce-trade-backend/ms8-real-time-notifications/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # 1. Compilar y Testear Backend Java (MS0 - MS7)
      - name: Build and Test Java Backend
        working-directory: uce-trade-backend
        run: |
          chmod +x gradlew
          ./gradlew test jacocoTestReport

      # 2. Testear Go Backend (MS3, MS4, MS9)
      - name: Test Go Backend
        working-directory: uce-trade-backend
        run: |
          for ms in ms3-catalog-query ms4-search-discovery ms9-analytics-dashboards; do
            echo "Testing $ms"
            cd $ms
            go test -coverprofile=coverage.out ./... || true
            cd ..
          done

      # 3. Testear Node.js Backend (MS5, MS8)
      - name: Test Node.js Backend
        working-directory: uce-trade-backend
        run: |
          for ms in ms5-interactions-reviews ms8-real-time-notifications; do
            echo "Testing $ms"
            cd $ms
            npm ci || true
            npm run test -- --coverage || true
            cd ..
          done

      # 4. Testear Frontend (React)
      - name: Test Frontend
        working-directory: uce-trade-frontend
        run: |
          npm ci
          npm run test -- --coverage || true

      # 5. Escaneo de SonarQube Global
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: sqa_e748b664de249963aa85c1392b8e415565554508
          SONAR_HOST_URL: http://98.90.146.42:9000

      # 6. Check de Quality Gate (Opcional, previene merges con fallos graves)
      - name: SonarQube Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: sqa_e748b664de249963aa85c1392b8e415565554508
