name: MS6 Payments CI/CD

on:
  push:
    branches: [ "q/a", "main" ]
    paths:
      - 'uce-trade-backend/ms6-payments/**'
      - '.github/workflows/ms6-pipeline.yml'
  pull_request:
    branches: [ "q/a", "main" ]
    paths:
      - 'uce-trade-backend/ms6-payments/**'
      - '.github/workflows/ms6-pipeline.yml'

jobs:
  build-test-and-push:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./uce-trade-backend 
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Unit Tests (MS6)
      run: ./gradlew :ms6-payments:test

    - name: Build JAR file (MS6)
      run: ./gradlew :ms6-payments:bootJar

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Determine Docker Tag
      run: |
        if [ "${{ github.ref_name }}" == "main" ]; then
          echo "IMAGE_TAG=prod" >> $GITHUB_ENV
        else
          echo "IMAGE_TAG=qa" >> $GITHUB_ENV
        fi

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./uce-trade-backend/ms6-payments
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/ms6-payments:${{ env.IMAGE_TAG }}