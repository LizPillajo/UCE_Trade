name: MS1 Identity CI/CD

on:
  push:
    branches: [ "q/a", "main" ]
    paths:
      - 'uce-trade-backend/ms1-identity-and-access/**'
      - '.github/workflows/ms1-pipeline.yml'
  pull_request:
    branches: [ "q/a", "main" ]
    paths:
      - 'uce-trade-backend/ms1-identity-and-access/**'
      - '.github/workflows/ms1-pipeline.yml'

jobs:
  build-test-and-push:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./uce-trade-backend 
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Inject Firebase Secret
      run: |
        mkdir -p ./ms1-identity-and-access/src/main/resources
        echo '${{ secrets.FIREBASE_JSON_SECRET }}' > ./ms1-identity-and-access/src/main/resources/firebase-service-account.json

    - name: Run Unit Tests (MS1)
      run: ./gradlew :ms1-identity-and-access:test

    - name: Build JAR file (MS1)
      run: ./gradlew :ms1-identity-and-access:bootJar

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Determine Docker Tag
      run: |
        if [ "${{ github.ref_name }}" == "main" ]; then
          echo "IMAGE_TAG=prod" >> $GITHUB_ENV
        else
          echo "IMAGE_TAG=qa" >> $GITHUB_ENV
        fi

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./uce-trade-backend/ms1-identity-and-access
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/ms1-identity-and-access:${{ env.IMAGE_TAG }}