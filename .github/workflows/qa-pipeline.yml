name: QA Pipeline - UCE Trade

on:
  push:
    branches: [ "q/a", "main" ]
  pull_request:
    branches: [ "q/a", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Unit Tests (Q/A)
      run: ./gradlew :ms2-product-command:test