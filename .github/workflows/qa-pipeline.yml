name: CI/CD Pipeline - UCE Trade

on:
  push:
    branches: [ "q/a", "main" ]
  pull_request:
    branches: [ "q/a", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Unit Tests (Q/A)
      run: ./gradlew :ms2-product-command:test

    - name: Build JAR file
      run: ./gradlew :ms2-product-command:bootJar

    # Only push to Docker Hub if we are on the main or q/a branch
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./ms2-product-command
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/ms2-product-command:latest