server {
    listen 80;
    server_name lizpillajoprod1.distribuidauce.org;

    # Backend API Route
    location /api/ {
        proxy_pass http://uce-trade-prod-alb-1199123471.us-east-1.elb.amazonaws.com/api/;
        
        # Opcional: configurar headers para preservar la IP del cliente
        proxy_set_header Host uce-trade-prod-alb-1199123471.us-east-1.elb.amazonaws.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend Route (S3)
    # Suponiendo que el bucket de prod se llama uce-trade-frontend-prod
    location / {
        proxy_pass http://uce-trade-frontend-prod.s3-website-us-east-1.amazonaws.com/;
        proxy_set_header Host uce-trade-frontend-prod.s3-website-us-east-1.amazonaws.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }
}
