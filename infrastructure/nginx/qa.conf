server {
    listen 80;
    server_name lizpillajoqa1.distribuidauce.org;

    # Backend API Route
    # Redirige todo lo que empiece con /api/ hacia el Application Load Balancer de AWS
    location /api/ {
        proxy_pass http://uce-trade-qa-alb-1884682480.us-east-1.elb.amazonaws.com/api/;
        
        # Opcional: configurar headers para preservar la IP del cliente
        proxy_set_header Host uce-trade-qa-alb-1884682480.us-east-1.elb.amazonaws.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend Route (S3)
    # Redirige la raíz y demás rutas hacia el bucket de S3 que contiene el Frontend
    location / {
        proxy_pass http://uce-trade-frontend-qa.s3-website-us-east-1.amazonaws.com/;
        proxy_set_header Host uce-trade-frontend-qa.s3-website-us-east-1.amazonaws.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Soporte para Single Page Application (React/Vue/Angular) si S3 no maneja bien los 404s
        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }
}
