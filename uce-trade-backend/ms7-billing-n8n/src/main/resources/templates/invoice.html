<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Invoice</title>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; padding: 20px; color: #333; }
        .invoice-box { max-width: 800px; margin: auto; padding: 30px; border: 1px solid #eee; box-shadow: 0 0 10px rgba(0, 0, 0, 0.15); }
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid #efb034; padding-bottom: 20px; margin-bottom: 20px; }
        .title { font-size: 32px; color: #333; font-weight: bold; }
        .invoice-details { text-align: right; }
        .details-row { margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f8f8; font-weight: bold; }
        .total-row td { font-weight: bold; font-size: 1.2em; border-top: 2px solid #333; }
        .footer { margin-top: 50px; text-align: center; color: #777; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="invoice-box">
        <div class="header">
            <div class="title">UCE Trade</div>
            <div class="invoice-details">
                <div class="details-row"><strong>Invoice #:</strong> <span th:text="${invoiceId}">123</span></div>
                <div class="details-row"><strong>Date:</strong> <span th:text="${date}">2023-01-01</span></div>
                <div class="details-row"><strong>Student ID:</strong> <span th:text="${studentId}">STD-001</span></div>
            </div>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>Description</th>
                    <th>Venture ID</th>
                    <th style="text-align: right;">Amount</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Payment for Service</td>
                    <td th:text="${ventureId}">V-100</td>
                    <td style="text-align: right;" th:text="'$' + ${amount}">$0.00</td>
                </tr>
                <tr class="total-row">
                    <td colspan="2" style="text-align: right;">Total</td>
                    <td style="text-align: right;" th:text="'$' + ${amount}">$0.00</td>
                </tr>
            </tbody>
        </table>
        
        <div class="footer">
            Thank you for your business! <br/>
            UCE Trade Automated Billing System
        </div>
    </div>
</body>
</html>
