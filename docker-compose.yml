services:
  ms1-postgres:
    image: postgres:15
    container_name: uce_trade_ms1_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - ms1_db_data:/var/lib/postgresql/data

  ms2-mysql:
    image: mysql:8.0
    container_name: uce_trade_ms2_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - ms2_db_data:/var/lib/mysql
    
  ms3-mongo:
    image: mongo:latest
    container_name: uce_trade_ms3_db
    ports:
      - "27017:27017"
    volumes:
      - ms3_db_data:/data/db
      
  ms4-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: uce_trade_ms4_db
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false 
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" 
    ports:
      - "9200:9200"
    volumes:
      - ms4_db_data:/usr/share/elasticsearch/data

  kafka:
    image: apache/kafka:latest
    container_name: uce_trade_kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER

volumes:
  ms1_db_data: 
  ms2_db_data:
  ms3_db_data:
  ms4_db_data: