services:
  ms1-postgres:
    image: postgres:15
    container_name: uce_trade_ms1_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
      POSTGRES_DB: ${POSTGRES_DB:-uce_trade_ms1}
    ports:
      - "5433:5432"
    volumes:
      - ms1_db_data:/var/lib/postgresql/data

  ms2-mysql:
    image: mysql:8.0
    container_name: uce_trade_ms2_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-uce_trade_ms2}
    ports:
      - "3306:3306"
    volumes:
      - ms2_db_data:/var/lib/mysql
    
  ms3-mongo:
    image: mongo:latest
    container_name: uce_trade_ms3_db
    ports:
      - "27017:27017"
    volumes:
      - ms3_db_data:/data/db
      
  ms4-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: uce_trade_ms4_db
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false 
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" 
    ports:
      - "9200:9200"
    volumes:
      - ms4_db_data:/usr/share/elasticsearch/data
  
  ms5-cassandra:
    image: cassandra:latest
    container_name: uce_trade_ms5_db
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=UCECluster
    volumes:
      - ms5_db_data:/var/lib/cassandra
  
  ms6-mariadb:
    image: mariadb:10.11
    container_name: uce_trade_ms6_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MARIADB_DATABASE:-uce_trade_ms6}
    ports:
      - "3307:3306"
    volumes:
      - ms6_db_data:/var/lib/mysql

  ms7-postgres:
    image: postgres:15
    container_name: uce_trade_ms7_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-uce_trade_ms7}
    ports:
      - "5434:5432"
    volumes:
      - ms7_db_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: uce_trade_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  kafka:
    image: apache/kafka:latest
    container_name: uce_trade_kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER

  redis:
    image: redis:7-alpine
    container_name: uce_trade_redis
    ports:
      - "6379:6379"

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: uce_trade_mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infrastructure/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  ms8-notifications:
    build: ./uce-trade-backend/ms8-real-time-notifications
    container_name: uce_trade_ms8
    ports:
      - "3008:3008"
    environment:
      - PORT=3008
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - MQTT_URL=mqtt://mosquitto:1883
    depends_on:
      - redis
      - rabbitmq
      - mosquitto

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: uce_trade_n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_PORT=5678
      - N8N_HOST=localhost
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/Guayaquil
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
    volumes:
      - n8n_data:/home/node/.n8n

  ms9-postgres:
    image: postgres:15
    container_name: uce_trade_ms9_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ms9_db}
    ports:
      - "5435:5432"
    volumes:
      - ms9_db_data:/var/lib/postgresql/data

  ms9-analytics-dashboards:
    build: ./uce-trade-backend/ms9-analytics-dashboards
    container_name: uce_trade_ms9
    ports:
      - "3009:3009"
    environment:
      - PORT=3009
      - DATABASE_URL=postgres://postgres:postgres@ms9-postgres:5432/ms9_db?sslmode=disable
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - MQTT_URL=mqtt://mosquitto:1883
    depends_on:
      - ms9-postgres
      - rabbitmq
      - mosquitto

volumes:
  ms1_db_data: 
  ms2_db_data:
  ms3_db_data:
  ms4_db_data:
  ms5_db_data:
  ms6_db_data:
  ms7_db_data:
  ms9_db_data:
  n8n_data: